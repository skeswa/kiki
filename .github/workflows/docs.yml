name: Documentation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "scripts/check-docs.ts"
      - "package.json"
      - "bun.lock"
      - "mise.toml"
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "scripts/check-docs.ts"
      - "package.json"
      - "bun.lock"
      - "mise.toml"

# Every job opts into only the permissions it needs.
permissions: {}

jobs:
  build:
    name: Check and build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      VITEPRESS_BASE: /kiki/
      VITEPRESS_SITE_URL: https://skeswa.github.io/kiki/

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Required for accurate VitePress last-updated timestamps.
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5

      - name: Restore documentation caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
            docs/.vitepress/cache
          key: ${{ runner.os }}-docs-${{ hashFiles('bun.lock', 'docs/**') }}
          restore-keys: |
            ${{ runner.os }}-docs-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check and build documentation
        run: bun run docs:check

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy documentation
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
